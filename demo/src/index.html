<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebWamrc — Browser-side AOT Compiler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a24;
      --border:    #2e2e40;
      --accent:    #7c6af7;
      --accent-h:  #9b8dff;
      --text:      #e2e2ec;
      --muted:     #8080a0;
      --success:   #4caf7d;
      --error:     #e05c5c;
      --info:      #5b9bd5;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      margin: 0 0 .25rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-h);
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 2rem;
      font-size: .95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .4rem;
      font-weight: 500;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    input[type="file"],
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: .55rem .75rem;
      font-size: .95rem;
      appearance: none;
      cursor: pointer;
    }

    input[type="file"]:focus,
    select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .actions {
      display: flex;
      gap: .75rem;
      margin-top: 1rem;
    }

    button {
      flex: 1;
      padding: .65rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }

    #compile-btn {
      background: var(--accent);
      color: #fff;
    }
    #compile-btn:hover:not(:disabled) { background: var(--accent-h); }

    #download-btn {
      background: var(--success);
      color: #fff;
    }
    #download-btn:hover:not(:disabled) { filter: brightness(1.1); }

    button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .status {
      padding: .6rem .9rem;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .status--info    { background: rgba(91,155,213,.15); color: var(--info); }
    .status--success { background: rgba(76,175,125,.15); color: var(--success); }
    .status--error   { background: rgba(224, 92, 92,.15); color: var(--error); }

    pre#log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .85rem 1rem;
      height: 220px;
      overflow-y: auto;
      font-size: .8rem;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    .section-title {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin: 0 0 .5rem;
      font-weight: 600;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
    }
    footer a { color: var(--accent-h); }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebWamrc</h1>
    <p class="subtitle">
      Compile a <code>.wasm</code> file to a bare-metal AOT <code>.aot</code> image
      for ARM Cortex-M microcontrollers — entirely in your browser, no server required.
    </p>

    <div id="status" class="status status--info">Initialising…</div>

    <div class="card">
      <label for="wasm-input">WebAssembly input (.wasm)</label>
      <input type="file" id="wasm-input" accept=".wasm" />
    </div>

    <div class="card">
      <label for="target-select">Compilation target</label>
      <select id="target-select"></select>
    </div>

    <div class="actions">
      <button id="compile-btn" disabled>Compile to AOT</button>
      <button id="download-btn" disabled>Download .aot</button>
    </div>

    <div style="margin-top:1.5rem">
      <p class="section-title">Compiler log</p>
      <pre id="log"></pre>
    </div>

    <footer>
      Powered by <a href="https://github.com/bytecodealliance/wasm-micro-runtime" target="_blank">WAMR wamrc</a>
      compiled to WebAssembly via <a href="https://emscripten.org" target="_blank">Emscripten</a>.
    </footer>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
